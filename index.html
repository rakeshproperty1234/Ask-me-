<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            light: '#f0f4f9',
                            dark: '#131314',
                            sidebar: '#1e1f20',
                            userMessage: '#e3e3e3',
                            userMessageDark: '#282a2c'
                        }
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>

    <style>
        /* Custom scrollbar and utilities */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        .markdown-body p { margin-bottom: 0.75em; }
        .markdown-body pre { background: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
        .markdown-body code { font-family: monospace; background: rgba(128,128,128,0.2); padding: 0.125rem 0.25rem; border-radius: 0.25rem; }
        .markdown-body pre code { background: transparent; padding: 0; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }

        /* Loader */
        #loading {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #ffffff; display: flex; justify-content: center; align-items: center;
            z-index: 9999; font-family: sans-serif; font-size: 1.5rem; color: #333; transition: opacity 0.3s;
        }
        .dark #loading { background: #131314; color: #fff; }
    </style>
</head>
<body class="bg-white dark:bg-gemini-dark text-gray-900 dark:text-gray-100 overflow-hidden h-[100dvh] flex">

    <div id="loading">Loading App...</div>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden md:hidden" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-30 w-72 bg-gray-50 dark:bg-gemini-sidebar transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col h-[100dvh] border-r border-gray-200 dark:border-gray-800">
        <div class="p-4 flex justify-between items-center">
            <button onclick="createNewChat()" class="flex-1 bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm font-medium py-2.5 px-4 rounded-full border border-gray-200 dark:border-gray-700 shadow-sm transition-colors flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New Chat
            </button>
            <button onclick="toggleSidebar()" class="md:hidden ml-2 p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-3" id="chat-history-list">
            </div>

        <div class="p-4 border-t border-gray-200 dark:border-gray-800 flex justify-between">
            <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" title="Toggle Dark Mode">
                <svg id="theme-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
            <button onclick="openSettings()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" title="Settings">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-[100dvh] min-w-0 bg-white dark:bg-gemini-dark relative">
        <header class="h-14 flex items-center px-4 border-b border-gray-100 dark:border-gray-800 shrink-0">
            <button onclick="toggleSidebar()" class="md:hidden p-2 -ml-2 mr-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 id="current-chat-title" class="font-semibold text-lg truncate select-none">New Chat</h1>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 scroll-smooth pb-32">
            <div id="messages" class="max-w-3xl mx-auto space-y-6">
                </div>
            
            <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center opacity-50 hidden">
                <svg class="w-16 h-16 mb-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                <h2 class="text-2xl font-bold">How can I help you today?</h2>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-white via-white to-transparent dark:from-gemini-dark dark:via-gemini-dark p-4 pt-10">
            <div class="max-w-3xl mx-auto relative rounded-3xl bg-gemini-light dark:bg-gray-800 shadow-sm border border-gray-200 dark:border-gray-700 flex items-end">
                <textarea id="message-input" rows="1" placeholder="Type a message..." class="w-full bg-transparent max-h-48 resize-none py-4 pl-6 pr-14 focus:outline-none rounded-3xl text-base dark:text-white" oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
                <button id="send-button" onclick="sendMessage()" class="absolute right-3 bottom-3 p-2 rounded-full text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
            <p class="text-center text-xs text-gray-400 mt-2">AI can make mistakes. Verify important information.</p>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-center items-center p-4">
        <div class="bg-white dark:bg-gray-900 rounded-2xl w-full max-w-md p-6 shadow-xl border border-gray-200 dark:border-gray-800">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Settings</h2>
                <button onclick="closeSettings()" class="text-gray-500 hover:text-gray-900 dark:hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Model Name</label>
                    <input type="text" id="model-input" class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="deepseek/deepseek-r1:free">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea id="system-prompt-input" rows="3" class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="You are a helpful assistant..."></textarea>
                </div>
            </div>
            
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeSettings()" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white transition-colors">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let chats = [];
        let currentChatId = null;
        let isGenerating = false;
        let abortController = null;
        
        let config = {
            apiKey: '',
            model: 'deepseek/deepseek-r1:free',
            systemPrompt: 'You are a helpful and concise AI assistant.',
            theme: 'light'
        };

        // DOM Elements
        const DOM = {
            loading: document.getElementById('loading'),
            messages: document.getElementById('messages'),
            emptyState: document.getElementById('empty-state'),
            input: document.getElementById('message-input'),
            sendBtn: document.getElementById('send-button'),
            chatList: document.getElementById('chat-history-list'),
            chatTitle: document.getElementById('current-chat-title'),
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebar-overlay'),
            settingsModal: document.getElementById('settings-modal'),
            apiKeyInput: document.getElementById('api-key-input'),
            modelInput: document.getElementById('model-input'),
            systemPromptInput: document.getElementById('system-prompt-input'),
            themeIcon: document.getElementById('theme-icon'),
            chatContainer: document.getElementById('chat-container')
        };

        // Initialization
        function init() {
            try {
                loadConfig();
                loadChats();
                applyTheme();
                
                if (chats.length === 0) {
                    createNewChat();
                } else {
                    switchChat(chats[0].id);
                }
                
                DOM.loading.style.opacity = '0';
                setTimeout(() => DOM.loading.style.display = 'none', 300);
                
                DOM.input.focus();
            } catch (e) {
                console.error("Initialization error:", e);
                DOM.loading.textContent = "Error loading app. Please clear site data.";
            }
        }

        // Configuration Management
        function loadConfig() {
            const saved = localStorage.getItem('ai_chat_config');
            if (saved) {
                config = { ...config, ...JSON.parse(saved) };
            }
        }

        function saveConfig() {
            localStorage.setItem('ai_chat_config', JSON.stringify(config));
        }

        // Chat Management
        function loadChats() {
            const saved = localStorage.getItem('ai_chat_history');
            if (saved) chats = JSON.parse(saved);
        }

        function saveChats() {
            localStorage.setItem('ai_chat_history', JSON.stringify(chats));
            renderSidebar();
        }

        function createNewChat() {
            if (isGenerating) return;
            const newChat = {
                id: Date.now().toString(),
                title: 'New Chat',
                messages: []
            };
            chats.unshift(newChat);
            saveChats();
            switchChat(newChat.id);
            if(window.innerWidth < 768) toggleSidebar(); // Close sidebar on mobile
        }

        function switchChat(id) {
            if (isGenerating) return;
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            if (!chat) return;
            
            DOM.chatTitle.textContent = chat.title;
            renderMessages();
            renderSidebar();
            DOM.input.value = '';
            autoResize(DOM.input);
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            if (isGenerating) return;
            if(!confirm("Delete this chat?")) return;
            
            chats = chats.filter(c => c.id !== id);
            if (chats.length === 0) {
                createNewChat();
            } else if (currentChatId === id) {
                switchChat(chats[0].id);
            } else {
                saveChats();
            }
        }

        // UI Rendering
        function renderSidebar() {
            DOM.chatList.innerHTML = '';
            chats.forEach(chat => {
                const isActive = chat.id === currentChatId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-3 mb-1 rounded-lg cursor-pointer transition-colors ${isActive ? 'bg-gray-200 dark:bg-gray-800' : 'hover:bg-gray-100 dark:hover:bg-gray-800'}`;
                div.onclick = () => switchChat(chat.id);
                
                const title = document.createElement('span');
                title.className = 'truncate text-sm pr-2 text-gray-700 dark:text-gray-300';
                title.textContent = chat.title;
                
                const delBtn = document.createElement('button');
                delBtn.className = `p-1 rounded text-gray-400 hover:text-red-500 md:opacity-0 group-hover:opacity-100 transition-opacity ${isActive ? 'opacity-100' : ''}`;
                delBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>';
                delBtn.onclick = (e) => deleteChat(chat.id, e);
                
                div.appendChild(title);
                div.appendChild(delBtn);
                DOM.chatList.appendChild(div);
            });
        }

        function renderMessages() {
            const chat = chats.find(c => c.id === currentChatId);
            DOM.messages.innerHTML = '';
            
            if (chat.messages.length === 0) {
                DOM.emptyState.classList.remove('hidden');
            } else {
                DOM.emptyState.classList.add('hidden');
                chat.messages.forEach(msg => appendMessageToDOM(msg.role, msg.content));
                scrollToBottom();
            }
        }

        function appendMessageToDOM(role, content) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            if (role === 'user') {
                bubble.className = 'max-w-[85%] bg-gemini-userMessage dark:bg-gemini-userMessageDark text-gray-900 dark:text-white px-5 py-3.5 rounded-3xl rounded-tr-sm text-[15px] whitespace-pre-wrap';
                bubble.textContent = content; // secure raw text for user
            } else {
                bubble.className = 'max-w-[100%] w-full text-gray-900 dark:text-gray-100 py-2 markdown-body text-[15px]';
                // Process markdown safely
                const parsed = marked.parse(content);
                bubble.innerHTML = DOMPurify.sanitize(parsed);
            }
            
            wrapper.appendChild(bubble);
            DOM.messages.appendChild(wrapper);
            return bubble;
        }

        // Interaction Logic
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 192) + 'px'; // Max 12rem
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            if (isGenerating) return;
            
            const text = DOM.input.value.trim();
            if (!text) return;

            if (!config.apiKey) {
                alert("Please set your OpenRouter API Key in Settings first.");
                openSettings();
                return;
            }

            // Update UI & State
            const chat = chats.find(c => c.id === currentChatId);
            chat.messages.push({ role: 'user', content: text });
            
            // Auto-generate title for first message
            if (chat.messages.length === 1) {
                chat.title = text.length > 25 ? text.substring(0, 25) + '...' : text;
            }
            
            saveChats();
            DOM.input.value = '';
            autoResize(DOM.input);
            DOM.emptyState.classList.add('hidden');
            
            appendMessageToDOM('user', text);
            scrollToBottom();
            
            // Prepare AI Response bubble
            const aiBubbleWrapper = document.createElement('div');
            aiBubbleWrapper.className = 'flex w-full justify-start';
            const aiBubble = document.createElement('div');
            aiBubble.className = 'max-w-[100%] w-full text-gray-900 dark:text-gray-100 py-2 markdown-body text-[15px]';
            
            // Loading indicator
            aiBubble.innerHTML = '<span class="animate-pulse text-gray-400">● ● ●</span>';
            aiBubbleWrapper.appendChild(aiBubble);
            DOM.messages.appendChild(aiBubbleWrapper);
            scrollToBottom();

            // Setup API call
            isGenerating = true;
            DOM.sendBtn.disabled = true;
            DOM.sendBtn.innerHTML = '<svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
            
            abortController = new AbortController();
            
            let fullResponse = '';

            try {
                const messagesPayload = chat.messages.map(m => ({role: m.role, content: m.content}));
                if (config.systemPrompt) {
                    messagesPayload.unshift({ role: 'system', content: config.systemPrompt });
                }

                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${config.apiKey}`,
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Universal AI Chat'
                    },
                    body: JSON.stringify({
                        model: config.model,
                        messages: messagesPayload,
                        stream: true
                    }),
                    signal: abortController.signal
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`API Error ${response.status}: ${errText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                aiBubble.innerHTML = ''; // Clear loading

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.trim() === '' || !line.startsWith('data: ')) continue;
                        const dataStr = line.slice(6).trim();
                        if (dataStr === '[DONE]') continue;
                        
                        try {
                            const data = JSON.parse(dataStr);
                            const content = data.choices[0]?.delta?.content;
                            if (content) {
                                fullResponse += content;
                                aiBubble.innerHTML = DOMPurify.sanitize(marked.parse(fullResponse));
                                scrollToBottom();
                            }
                        } catch (e) {
                            console.warn("SSE Parse error on chunk", dataStr, e);
                        }
                    }
                }

            } catch (error) {
                if (error.name !== 'AbortError') {
                    console.error("Chat Error:", error);
                    aiBubble.innerHTML = `<div class="text-red-500 bg-red-50 dark:bg-red-900/20 p-4 rounded-lg">Error: ${error.message}</div>`;
                    fullResponse = "Error occurred.";
                }
            } finally {
                if(fullResponse !== "Error occurred."){
                    chat.messages.push({ role: 'assistant', content: fullResponse });
                    saveChats();
                }
                
                isGenerating = false;
                DOM.sendBtn.disabled = false;
                DOM.sendBtn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>';
            }
        }

        function scrollToBottom() {
            DOM.chatContainer.scrollTop = DOM.chatContainer.scrollHeight;
        }

        // Layout & Modals
        function toggleSidebar() {
            const isClosed = DOM.sidebar.classList.contains('-translate-x-full');
            if (isClosed) {
                DOM.sidebar.classList.remove('-translate-x-full');
                DOM.sidebarOverlay.classList.remove('hidden');
            } else {
                DOM.sidebar.classList.add('-translate-x-full');
                DOM.sidebarOverlay.classList.add('hidden');
            }
        }

        function openSettings() {
            DOM.apiKeyInput.value = config.apiKey;
            DOM.modelInput.value = config.model;
            DOM.systemPromptInput.value = config.systemPrompt;
            DOM.settingsModal.classList.remove('hidden');
        }

        function closeSettings() {
            DOM.settingsModal.classList.add('hidden');
        }

        function saveSettings() {
            config.apiKey = DOM.apiKeyInput.value.trim();
            config.model = DOM.modelInput.value.trim() || 'deepseek/deepseek-r1:free';
            config.systemPrompt = DOM.systemPromptInput.value.trim();
            saveConfig();
            closeSettings();
        }

        function toggleTheme() {
            config.theme = config.theme === 'light' ? 'dark' : 'light';
            saveConfig();
            applyTheme();
        }

 <script>

// ✅ FIX DOM issue (MOST IMPORTANT)
document.addEventListener("DOMContentLoaded", () => {
    if (typeof DOM !== "undefined") {
        DOM.themeIcon = document.getElementById("theme-icon");
    }
});

// ✅ SAFE APPLY THEME
function applyTheme() {
    try {
        const html = document.documentElement;

        if (typeof config === "undefined") return;

        const isDark = config.theme === "dark";
        html.classList.toggle("dark", isDark);

        const icon = document.getElementById("theme-icon");
        if (icon) {
            icon.innerHTML = isDark
                ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                   d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>`
                : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                   d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>`;
        }

    } catch (e) {
        console.warn("Theme error:", e);
    }
}

// ✅ SAFE INIT
function init() {
    console.log("🚀 App Starting...");

    try {
        if (typeof loadConfig === "function") loadConfig();
        if (typeof loadChats === "function") loadChats();
        if (typeof applyTheme === "function") applyTheme();

        if (typeof chats !== "undefined" && Array.isArray(chats)) {
            if (chats.length === 0 && typeof createNewChat === "function") {
                createNewChat();
            } else if (chats.length > 0 && typeof switchChat === "function") {
                switchChat(chats[0].id);
            }
        }

    } catch (e) {
        console.error("❌ Init error:", e);
    }

    // 🔥 FORCE REMOVE LOADER
    const loader = document.getElementById("loading");
    if (loader) {
        loader.style.opacity = "0";
        setTimeout(() => loader.remove(), 300);
    }

    console.log("✅ App Loaded");
}

// ✅ AUTO RUN
document.addEventListener("DOMContentLoaded", init);

// 🔥 FINAL BACKUP (even if everything fails)
window.onload = function () {
    const loader = document.getElementById("loading");
    if (loader) loader.style.display = "none";
};

</script>
